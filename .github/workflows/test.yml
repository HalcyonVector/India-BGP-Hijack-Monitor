name: Detection logic tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python db/store.py
      - run: python backend/detector/baseline.py
      - run: python backend/detector/test_detection_logic.py
